# ===========================================================================
# DST Cluster — two shards running as two containers, forming one world.
# DST 集群 — 两个分片以两个容器运行，构成一个统一世界。
#
#   dst_master -> the surface world (forest). Players spawn here.
#                 地表世界（森林）。玩家在此诞生。
#   dst_caves  -> the caves world. Joined to the master via a private
#                 Docker network using the master's container name as hostname.
#                 洞穴世界。通过私有 Docker 网络与主世界相连，
#                 使用主容器的容器名作为主机名。
#
# Both build from the same Dockerfile and share the same config + mods folders;
# only SHARD_NAME (and the port) differs.
# 两者由同一 Dockerfile 构建，共享相同的配置和 mod 目录；
# 仅 SHARD_NAME 及端口不同。
#
# Values like ${MASTER_PORT:-11999} mean "use $MASTER_PORT from the .env file,
# or fall back to 11999". Copy .env.example to .env to override names/ports.
# ${MASTER_PORT:-11999} 表示"使用 .env 文件中的 $MASTER_PORT 或回退到 11999"。
# 复制 .env.example 为 .env 即可覆盖名称/端口。
# ===========================================================================
services:
  dst_caves:
    container_name: ${CAVES_NAME:-dst_caves}   # host-visible container name / 主机可见的容器名
    build: .                                   # build from ./Dockerfile / 从 ./Dockerfile 构建
    ports:
      - "${CAVES_PORT:-11998}:11998/udp"       # DST uses UDP only; host:container / DST 仅使用 UDP
    networks:
      - dst_cluster                            # private net shared with master / 与主世界共享的私有网络
    volumes:
      # Cluster config + saves. Mounted at Cluster_1 because that is the cluster
      # folder name the server expects under .klei/DoNotStarveTogether.
      # 集群配置及存档。挂载到 Cluster_1，即服务端在 .klei/DoNotStarveTogether 下
      # 期望的集群文件夹名称。
      - ./dst_config:/home/dst/.klei/DoNotStarveTogether/Cluster_1
      # Install dir as a NAMED volume (not a bind mount). Bind-mounting a host dir
      # that doesn't yet exist makes Docker create it root:root, which masks the
      # Dockerfile chown so steamcmd (user dst) can't write -> it silently falls
      # back to ~/Steam and start.sh can't find the binary. A named volume is seeded
      # from the image's dst-owned directory on first use, so it's writable by dst
      # out of the box and never root-owned.
      # 安装目录用命名卷（非 bind mount）。bind mount 一个不存在的宿主目录会被
      # Docker 以 root:root 创建，覆盖 Dockerfile 的 chown，使运行 steamcmd 的 dst
      # 用户不可写 -> 静默回退到 ~/Steam，start.sh 找不到二进制。命名卷首次挂载会从
      # 镜像层复制内容（含属主），故开箱即对 dst 可写、永不归 root。
      - dst_server_cache:/home/dst/dst_server_cache
      - ./start.sh:/home/dst/start.sh:ro          # live-mount so edits apply on restart / 实时挂载，修改后重启生效
    environment:
      - SHARD_NAME=Caves
    depends_on:
    - dst_master
    restart: unless-stopped

  dst_master:
    container_name: ${MASTER_NAME:-dst_master}
    build: .
    networks:
      - dst_cluster
    ports:
      - "${MASTER_PORT:-11999}:11999/udp"
    volumes:
      - ./dst_config:/home/dst/.klei/DoNotStarveTogether/Cluster_1
      - dst_server_cache:/home/dst/dst_server_cache
      - ./start.sh:/home/dst/start.sh:ro
    environment:
      - SHARD_NAME=Master
    restart: unless-stopped

# Private bridge network. Containers resolve each other by service/container name
# (e.g. cluster.ini sets master_ip = dst_master), so the caves shard can reach
# the master without any hard-coded IPs.
# 私有桥接网络。容器之间通过服务/容器名互相解析（如 cluster.ini 中
# master_ip = dst_master），洞穴分片无需硬编码 IP 即可连接主世界。
networks:
  dst_cluster:

# Named volume for the DST install + downloaded mods. Named (not a host bind mount)
# so it is seeded from the image's dst-owned directory on first use and is never
# root-owned; it persists across image rebuilds. `docker compose down -v` wipes it.
# 命名卷，存放 DST 安装及 mod。用命名卷（非宿主 bind mount）使其首次挂载从镜像层
# 继承 dst 属主、永不归 root；重建镜像时持久保留。`docker compose down -v` 会清除。
volumes:
  dst_server_cache:
