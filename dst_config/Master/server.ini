; Per-shard settings for the MASTER shard (the surface world where players spawn).
; Cluster-wide settings (name, password, mods, intention) live in ../cluster.ini.

[SHARD]
; Exactly one shard in the cluster must be the master. Keep this true here.
is_master = true
; Internal shard name; also the folder name (Master/) this config lives in.
name = Master


[NETWORK]
; UDP port this shard listens on inside the container. Must match the container
; side of the master port mapping in docker-compose.yml (11999).
server_port = 11999


[ACCOUNT]
; Store per-user save data under encoded folder names. Leave true (the default).
encode_user_path = true
