; ===========================================================================
; Master shard — the surface world where players spawn.
; 主世界分片 — 玩家诞生的地表世界。
;
; Per-shard settings for the MASTER shard. Cluster-wide settings
; (name, password, mods, intention) live in ../cluster.ini.
; 主世界分片的独立设置。集群级设置（名称、密码、mod、意图）
; 位于 ../cluster.ini。
; ===========================================================================

[SHARD]
; Exactly one shard in the cluster must be the master. Keep this true here.
; 集群中必须有且仅有一个主分片，此处保持 true。
is_master = true
; Internal shard name; also the folder name (Master/) this config lives in.
; 内部分片名；与该配置文件所在文件夹名 (Master/) 一致。
name = Master


[NETWORK]
; UDP port this shard listens on inside the container. Must match the container
; side of the master port mapping in docker-compose.yml (11999).
; 此分片在容器内监听的 UDP 端口。须与 docker-compose.yml 中
; 主世界端口映射的容器侧端口一致 (11999)。
server_port = 11999


[ACCOUNT]
; Store per-user save data under encoded folder names. Leave true (the default).
; 以编码文件夹名存储每用户存档数据，保持 true（默认值）即可。
encode_user_path = true
