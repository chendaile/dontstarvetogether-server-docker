; Per-shard settings for the CAVES shard (the underground world).
; Cluster-wide settings live in ../cluster.ini.

[SHARD]
; Caves is a secondary shard: it attaches to the master (set false here).
is_master = false
; Internal shard name; also the folder name (Caves/) this config lives in.
name = Caves

; This is field is automatically generated for non-master servers, and is used internally to uniquely
; identify a server. Here it's manually set for convenience purposes, if it's removed a new random
; number will be generated instead.
; DO NOT CHANGE after world creation; You may change it before starting up the server for the first
; time. Otherwise you might have issues where the Master shard won't identify Caves.
id = 586447616


[NETWORK]
; UDP port this shard listens on inside the container. Must match the container
; side of the caves port mapping in docker-compose.yml (11998).
server_port = 11998


[ACCOUNT]
; Store per-user save data under encoded folder names. Leave true (the default).
encode_user_path = true
